name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run App (Test)
        run: |
          python app.py &
          sleep 5
          curl http://localhost:5000 || echo "App not responding"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Step (Dummy)
        run: echo "Deploy step here (EC2 / Docker / etc)"
